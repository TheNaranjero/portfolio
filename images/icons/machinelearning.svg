    <line x1="60" y1="20" x2="85" y2="45" stroke="#222222" stroke-width="5" stroke-linecap="round"></line>

    <line x1="35" y1="45" x2="20" y2="75" stroke="#222222" stroke-width="5" stroke-linecap="round"></line>

