    <line x1="85" y1="45" x2="70" y2="75" stroke="#222222" stroke-width="5" stroke-linecap="round"></line>

    <line x1="85" y1="45" x2="100" y2="75" stroke="#222222" stroke-width="5" stroke-linecap="round"></line>

    <!-- Root -->
